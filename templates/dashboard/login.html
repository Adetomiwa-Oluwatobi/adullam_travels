{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Adullam Travels Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo__name">Adullam <span>Travels</span></div>
      <div class="login-logo__sub">Content Dashboard</div>
    </div>

    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
    {% endfor %}
    {% endif %}

    <h2 class="login-title">Welcome back</h2>
    <p class="login-sub">Sign in to manage your website content.</p>

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-orange btn-full btn-lg" style="margin-top:8px;">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div style="margin-top:24px;text-align:center;">
      <a href="{% url 'core:home' %}" style="font-size:0.8rem;color:var(--text-light);">
        <i class="fas fa-arrow-left"></i> Back to website
      </a>
    </div>
  </div>
</div>
</body>
</html>
